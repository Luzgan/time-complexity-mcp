name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Package release bundle
        shell: bash
        run: node scripts/package-release.mjs time-complexity-mcp-${{ matrix.platform }}-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: time-complexity-mcp-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/time-complexity-mcp-${{ matrix.platform }}-${{ matrix.arch }}-v*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Build release body
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -n 1 || true)

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$TAG")
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${TAG}")
          fi

          {
            echo '## Setup (Claude Code)'
            echo ''
            echo '1. Download and extract the archive for your platform'
            echo '2. Add to your Claude Code MCP config (`~/.claude.json` or project `.mcp.json`):'
            echo ''
            echo '```json'
            echo '{'
            echo '  "mcpServers": {'
            echo '    "time-complexity": {'
            echo '      "command": "node",'
            echo '      "args": ["/path/to/time-complexity-mcp/dist/index.js"]'
            echo '    }'
            echo '  }'
            echo '}'
            echo '```'
            echo ''
            echo '3. Restart Claude Code — the `analyze_file`, `analyze_function`, `analyze_directory`, and `get_supported_languages` tools will be available'
            echo ''
            echo '## Changes'
            echo ''
            echo "$COMMITS"
          } > /tmp/release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: /tmp/release-body.md
